# Deploys the site to GitHub Pages on every push to the default branch.
#
# Vivarium is a static site (plain HTML/CSS/ES modules), so "building" is just
# uploading the repository as-is. No bundler, no dependencies. To turn this on:
# repository Settings → Pages → Build and deployment → Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    # Deploy from main, and also from the initial working branch while it remains
    # the repository's default branch (the github-pages environment only permits
    # deploys from the default branch). Once main is made the default, the second
    # entry can be removed.
    branches: [main, claude/public-repo-project-vdav3j]
  workflow_dispatch: {}

# Allow this workflow to publish a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run tests
        run: node --test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
